<app-page-header
  title="Tabelas de apoio"
  subtitle="Listas de referência sincronizadas do RH (Senior) — somente leitura, usadas para enriquecer colaboradores e usuários."
/>

<div class="section-note">
  <i class="bi bi-info-circle"></i>
  <span>Estes cadastros são atualizados automaticamente pela sincronização e não são editáveis aqui.</span>
</div>

<ul class="nav nav-tabs mb-3">
  @for (tab of tabs; track tab.key) {
    <li class="nav-item">
      <button class="nav-link" [class.active]="activeTabKey() === tab.key" (click)="selectTab(tab.key)">
        <i class="bi me-1" [class]="tab.icon"></i>{{ tab.title }}
      </button>
    </li>
  }
</ul>

<div class="mb-3" style="max-width: 320px;">
  <div class="input-group">
    <span class="input-group-text"><i class="bi bi-search"></i></span>
    <input class="form-control" placeholder="Buscar…" [ngModel]="search()" (ngModelChange)="search.set($event)" />
  </div>
</div>

@if (loading()) {
  <app-loading-block label="Carregando…" />
} @else {
  <div class="table-card">
    <div class="table-responsive-card">
      <table class="table">
        <thead>
          <tr>
            <th style="width: 160px;">Código</th>
            <th>Nome</th>
          </tr>
        </thead>
        <tbody>
          @for (row of filteredRows; track row.id) {
            <tr>
              <td class="text-mono text-muted">{{ row.id }}</td>
              <td>{{ row.label }}</td>
            </tr>
          }

          @if (filteredRows.length === 0) {
            <tr>
              <td colspan="2">
                <app-empty-state [icon]="activeTab.icon" message="Nenhum registro encontrado." />
              </td>
            </tr>
          }
        </tbody>
      </table>
    </div>
  </div>
}
