<div class="auth-page">
  <div class="auth-card text-center">
    <div class="auth-brand">
      <span class="auth-brand-icon"><i class="bi bi-shield-lock"></i></span>
      <h1>Acesso negado</h1>
      <p>
        Sua credencial não tem o papel necessário para acessar essa área.
        @if (auth.roles().length > 0) {
          <br />Papéis atuais: <strong>{{ auth.roles().join(', ') }}</strong>
        }
      </p>
    </div>

    <div class="d-flex flex-column gap-2">
      <a routerLink="/" class="btn btn-primary w-100">
        <i class="bi bi-house-door me-1"></i> Voltar ao painel
      </a>
      <button type="button" class="btn btn-outline-secondary w-100" (click)="logout()">
        <i class="bi bi-box-arrow-right me-1"></i> Sair e entrar com outra conta
      </button>
    </div>
  </div>
</div>
