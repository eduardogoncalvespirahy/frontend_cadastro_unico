<div class="auth-page">
  <div class="auth-card">
    <div class="auth-brand">
      <span class="auth-brand-icon"><i class="bi bi-fingerprint"></i></span>
      <h1>Cadastro Único</h1>
      <p>Gestão central de usuários, credenciais e sistemas</p>
    </div>

    <div class="login-type mb-4">
      @for (t of types; track t.value) {
        <button
          type="button"
          class="login-type-btn"
          [class.active]="identifierType() === t.value"
          (click)="changeType(t.value)"
        >
          {{ t.label }}
        </button>
      }
    </div>

    <form (ngSubmit)="submit()">
      <div class="form-floating mb-3">
        <input
          id="identifier"
          class="form-control"
          name="identifier"
          [type]="identifierType() === 'registerNumber' ? 'number' : 'text'"
          [ngModel]="identifier()"
          (ngModelChange)="identifier.set($event)"
          autocomplete="username"
          placeholder="Identificação"
        />

        <label for="identifier">
          {{ identifierLabel() }}
        </label>
      </div>

      <div class="input-group mb-3">
        <div class="form-floating flex-grow-1">
          <input
            id="password"
            class="form-control"
            name="password"
            [type]="showPassword() ? 'text' : 'password'"
            [ngModel]="password()"
            (ngModelChange)="password.set($event)"
            autocomplete="current-password"
            placeholder="Senha"
          />

          <label for="password"> Senha </label>
        </div>

        <button
          type="button"
          class="btn btn-outline-secondary"
          (click)="togglePasswordVisibility()"
        >
          <i class="bi" [class.bi-eye]="!showPassword()" [class.bi-eye-slash]="showPassword()"></i>
        </button>
      </div>

      <div class="login-options">
        <div class="form-check form-switch">
          <input
            class="form-check-input"
            type="checkbox"
            id="remember"
            name="rememberAccess"
            [ngModel]="rememberAccess()"
            (ngModelChange)="rememberAccess.set($event)"
          />

          <label class="form-check-label" for="remember"> Lembrar acesso </label>
        </div>
      </div>

      @if (error(); as errorMessage) {
        <div class="alert alert-danger py-2 d-flex align-items-center gap-2">
          <i class="bi bi-exclamation-triangle-fill"></i>
          <span>{{ errorMessage }}</span>
        </div>
      }

      <button class="btn btn-primary w-100" type="submit" [disabled]="loading()">
        @if (loading()) {
          <span class="spinner-border spinner-border-sm me-2"></span>
        }
        {{ loading() ? 'Entrando…' : 'Entrar' }}
      </button>
    </form>
  </div>
</div>
